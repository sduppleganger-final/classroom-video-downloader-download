name: Build Mac Desktop App

on:
  workflow_dispatch:
    inputs:
      smoke_test_url:
        description: Optional media URL for packaged extractor metadata verification
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare current native Mac extractor
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run prepare:mac-ytdlp

      - name: Inspect bundled media helper binaries
        run: |
          node - <<'NODE'
          const ffmpeg = require("ffmpeg-static");
          const { constants } = require("youtube-dl-exec");
          const ytdlpStatic = require("yt-dlp-static");
          console.log(`ffmpeg=${ffmpeg}`);
          console.log(`youtube-dl-exec=${constants.YOUTUBE_DL_PATH}`);
          console.log(`yt-dlp-static=${ytdlpStatic}`);
          NODE
          file "$(node -p 'require("ffmpeg-static")')"
          file "$(node -p 'require("youtube-dl-exec").constants.YOUTUBE_DL_PATH')" || true
          file "$(node -p 'require("yt-dlp-static")')" || true

      - name: Build Mac package
        run: npm run build:mac -- --arch=${{ matrix.arch }}

      - name: Smoke test packaged native extractor
        env:
          SMOKE_TEST_URL: ${{ inputs.smoke_test_url }}
        run: |
          SMOKE_DIR="$RUNNER_TEMP/classroom-video-downloader-${{ matrix.arch }}"
          unzip -q dist-mac/*.zip -d "$SMOKE_DIR"
          EXTRACTOR_PATH="$(find "$SMOKE_DIR" -type f -path '*/app.asar.unpacked/node_modules/yt-dlp-static/bin/mac/yt-dlp' -print -quit)"
          test -n "$EXTRACTOR_PATH"
          file "$EXTRACTOR_PATH"
          EXTRACTOR_VERSION="$("$EXTRACTOR_PATH" --version)"
          echo "yt-dlp version: $EXTRACTOR_VERSION"
          test "$EXTRACTOR_VERSION" = "2026.07.04"
          if [ -n "$SMOKE_TEST_URL" ]; then
            set +e
            PROBE_OUTPUT="$("$EXTRACTOR_PATH" --no-playlist --no-warnings --skip-download --print '%(id)s|%(title)s' "$SMOKE_TEST_URL" 2>&1)"
            PROBE_STATUS=$?
            set -e
            printf '%s\n' "$PROBE_OUTPUT"
            if [ "$PROBE_STATUS" -ne 0 ]; then
              if printf '%s\n' "$PROBE_OUTPUT" | grep -Eqi "sign in to confirm|not a bot"; then
                echo "::warning::YouTube challenged the GitHub-hosted runner. The packaged native extractor launched successfully."
              else
                exit "$PROBE_STATUS"
              fi
            fi
          fi

      - name: Create checksums
        run: shasum -a 256 dist-mac/*.zip | tee "dist-mac/SHA256SUMS-mac-${{ matrix.arch }}.txt"

      - name: Resolve release tag
        id: release
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: classroom-video-downloader-mac-${{ matrix.arch }}
          path: |
            dist-mac/*.zip
            dist-mac/SHA256SUMS-mac-${{ matrix.arch }}.txt

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag }}" dist-mac/*.zip "dist-mac/SHA256SUMS-mac-${{ matrix.arch }}.txt" --clobber
